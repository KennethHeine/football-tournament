name: Recreate Resource Group (one-off)

# One-off maintenance workflow to delete this repo's resource group so the
# onboarding system can recreate it in the correct region (the old RG was created
# while the estate region was norwayeast; the estate now standardises on
# swedencentral and Azure cannot move an RG between regions). The repo's SP is
# Owner of rg-<repo>, so it can delete it. Safe to remove after the relocation.
#
# Guarded by a typed confirmation. Deploy the app again afterwards.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type the resource group name exactly to confirm deletion'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  delete-rg:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        env:
          CONFIRM: ${{ inputs.confirm }}
          RG: ${{ vars.RESOURCE_GROUP }}
        run: |
          set -euo pipefail
          TARGET="${RG:-rg-${GITHUB_REPOSITORY##*/}}"
          if [ "$CONFIRM" != "$TARGET" ]; then
            echo "::error::Confirmation '$CONFIRM' does not match resource group '$TARGET'. Aborting."
            exit 1
          fi
          echo "TARGET_RG=$TARGET" >> "$GITHUB_ENV"

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete resource group
        run: |
          set -euo pipefail
          if az group show -n "$TARGET_RG" >/dev/null 2>&1; then
            echo "Deleting $TARGET_RG (waiting for completion)..."
            az group delete -n "$TARGET_RG" --yes
            echo "Deleted $TARGET_RG."
          else
            echo "$TARGET_RG does not exist — nothing to delete."
          fi
