name: Repair Custom Domain (one-off)

# One-off operational repair for the fodbold.kscloud.io hostname binding.
# The repo SP is Owner of its resource group only, so it cannot read
# Microsoft.Web/locations/staticSitesOperationStatuses (subscription scope) —
# every long-running az staticwebapp operation must therefore run --no-wait,
# with completion observed via RG-scoped `hostname show/list` polling.
#
# Temporary file: removed from main once the repair is verified.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  rebind:
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Re-bind fodbold.kscloud.io
        shell: bash
        run: |
          set -uo pipefail
          HOST=fodbold.kscloud.io
          RG='${{ vars.RESOURCE_GROUP }}'
          [ -z "$RG" ] && RG="rg-${{ github.event.repository.name }}"
          name=$(az staticwebapp list --resource-group "$RG" --query "[0].name" -o tsv)
          echo "SWA: $name in $RG"

          if az staticwebapp hostname show --name "$name" --resource-group "$RG" --hostname "$HOST" -o none 2>/dev/null; then
            echo "Existing binding found — deleting (no-wait)..."
            az staticwebapp hostname delete --name "$name" --resource-group "$RG" \
              --hostname "$HOST" --yes --no-wait || true
            for i in $(seq 1 30); do
              az staticwebapp hostname show --name "$name" --resource-group "$RG" \
                --hostname "$HOST" -o none 2>/dev/null || break
              echo "  still present..."; sleep 10
            done
          else
            echo "No existing binding."
          fi

          echo "Adding hostname binding (cname-delegation, no-wait)..."
          az staticwebapp hostname set --name "$name" --resource-group "$RG" \
            --hostname "$HOST" --validation-method cname-delegation --no-wait || true

          echo "Waiting for binding to be Ready..."
          for i in $(seq 1 90); do
            status=$(az staticwebapp hostname show --name "$name" --resource-group "$RG" \
              --hostname "$HOST" --query status -o tsv 2>/dev/null || echo pending)
            echo "  $status"
            [ "$status" = "Ready" ] && exit 0
            sleep 10
          done
          echo "::error::Hostname did not reach Ready within 15 minutes"
          exit 1
